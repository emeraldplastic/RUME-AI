<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="RUME AI is a secure resume screening workspace for ranking candidates against job requirements.">
    <title>RUME AI - Secure Resume Screening</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="bg-grid"></div>

    <section class="auth-wrapper" id="auth-wrapper">
        <div class="auth-card">
            <div class="brand-lockup">
                <div class="brand-mark" aria-hidden="true">
                    <svg viewBox="0 0 24 24"><path d="M7 3h7l5 5v13H7z"/><path d="M14 3v5h5"/><path d="M10 13h6"/><path d="M10 17h4"/></svg>
                </div>
                <div>
                    <h1>RUME AI</h1>
                    <p>Private resume intelligence</p>
                </div>
            </div>

            <div class="auth-tabs" role="tablist">
                <button class="auth-tab active" id="tab-login" type="button">Sign in</button>
                <button class="auth-tab" id="tab-register" type="button">Create account</button>
            </div>

            <form class="auth-form active" id="login-form">
                <label>
                    Username
                    <input id="login-username" name="username" autocomplete="username" required>
                </label>
                <label>
                    Password
                    <input id="login-password" name="password" type="password" autocomplete="current-password" required>
                </label>
                <button class="btn btn-primary btn-full" type="submit">Sign in</button>
            </form>

            <form class="auth-form" id="register-form">
                <label>
                    Username
                    <input id="reg-username" name="username" autocomplete="username" minlength="3" required>
                </label>
                <label>
                    Email
                    <input id="reg-email" name="email" type="email" autocomplete="email" required>
                </label>
                <label>
                    Display name
                    <input id="reg-display" name="display_name" autocomplete="name">
                </label>
                <label>
                    Password
                    <input id="reg-password" name="password" type="password" autocomplete="new-password" minlength="8" required>
                </label>
                <button class="btn btn-primary btn-full" type="submit">Create account</button>
            </form>
        </div>
    </section>

    <div class="app-shell" id="app-shell" hidden>
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-brand">
                <div class="brand-mark small" aria-hidden="true">
                    <svg viewBox="0 0 24 24"><path d="M7 3h7l5 5v13H7z"/><path d="M14 3v5h5"/></svg>
                </div>
                <span>RUME AI</span>
            </div>
            <nav class="sidebar-nav" aria-label="Primary">
                <button class="nav-item active" data-view="dashboard" type="button">Dashboard</button>
                <button class="nav-item" data-view="jobs" type="button">Jobs</button>
                <button class="nav-item" data-view="job-form" type="button">New job</button>
                <button class="nav-item" data-view="upload" type="button">Upload</button>
                <button class="nav-item" data-view="results" type="button">Results</button>
            </nav>
            <div class="sidebar-footer">
                <div class="user-chip">
                    <span class="avatar" id="user-avatar">U</span>
                    <span id="user-name">User</span>
                </div>
                <button class="icon-btn" id="btn-logout" type="button" title="Sign out">
                    <svg viewBox="0 0 24 24"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><path d="M16 17l5-5-5-5"/><path d="M21 12H9"/></svg>
                </button>
            </div>
        </aside>

        <header class="mobile-bar">
            <button class="icon-btn" id="btn-menu" type="button" title="Menu">
                <svg viewBox="0 0 24 24"><path d="M4 7h16"/><path d="M4 12h16"/><path d="M4 17h16"/></svg>
            </button>
            <strong>RUME AI</strong>
            <button class="icon-btn" id="btn-mobile-logout" type="button" title="Sign out">
                <svg viewBox="0 0 24 24"><path d="M16 17l5-5-5-5"/><path d="M21 12H9"/></svg>
            </button>
        </header>

        <main class="main-area">
            <section class="view active" id="view-dashboard">
                <div class="view-header">
                    <div>
                        <p class="eyebrow">Overview</p>
                        <h2 id="greeting">Dashboard</h2>
                    </div>
                    <button class="btn btn-primary" data-action="new-job" type="button">New job</button>
                </div>

                <div class="stats-grid">
                    <article class="stat-card"><span>Total jobs</span><strong id="dash-total-jobs">0</strong></article>
                    <article class="stat-card"><span>Resumes</span><strong id="dash-total-resumes">0</strong></article>
                    <article class="stat-card"><span>Analyzed</span><strong id="dash-analyzed">0</strong></article>
                    <article class="stat-card"><span>Avg score</span><strong id="dash-avg-score">0</strong></article>
                </div>

                <div class="two-column">
                    <section class="panel">
                        <div class="panel-header"><h3>Recent jobs</h3></div>
                        <div class="list" id="dash-recent-jobs"></div>
                    </section>
                    <section class="panel">
                        <div class="panel-header"><h3>Audit trail</h3></div>
                        <div class="list" id="dash-activity"></div>
                    </section>
                </div>
            </section>

            <section class="view" id="view-jobs">
                <div class="view-header">
                    <div>
                        <p class="eyebrow">Pipeline</p>
                        <h2>Jobs</h2>
                    </div>
                    <button class="btn btn-primary" data-action="new-job" type="button">New job</button>
                </div>
                <div class="jobs-grid" id="jobs-grid"></div>
            </section>

            <section class="view" id="view-job-form">
                <div class="view-header">
                    <div>
                        <p class="eyebrow">Role setup</p>
                        <h2 id="job-form-heading">Create job</h2>
                    </div>
                </div>
                <form class="form-panel" id="job-form">
                    <label class="span-2">Job title<input id="job-title" required></label>
                    <label class="span-2">Job description<textarea id="job-description" rows="7" required></textarea></label>
                    <label class="span-2">Required skills<input id="required-skills" placeholder="python, react, sql, aws"></label>
                    <label>Minimum experience<input id="min-experience" type="number" min="0" max="50" value="2"></label>
                    <label>Minimum education
                        <select id="min-education">
                            <option value="not specified">Not specified</option>
                            <option value="high school">High school</option>
                            <option value="associate">Associate</option>
                            <option value="bachelor" selected>Bachelor</option>
                            <option value="master">Master</option>
                            <option value="phd">PhD</option>
                        </select>
                    </label>
                    <div class="form-actions span-2">
                        <button class="btn btn-secondary" data-action="cancel-job" type="button">Cancel</button>
                        <button class="btn btn-primary" type="submit">Save job</button>
                    </div>
                </form>
            </section>

            <section class="view" id="view-upload">
                <div class="view-header">
                    <div>
                        <p class="eyebrow">Intake</p>
                        <h2>Upload resumes</h2>
                    </div>
                </div>
                <section class="panel">
                    <label class="select-row">Job
                        <select id="upload-job-select"></select>
                    </label>
                    <label class="upload-zone" id="upload-zone">
                        <input id="file-input" type="file" multiple accept=".pdf,.docx,.txt" hidden>
                        <span class="upload-icon" aria-hidden="true">
                            <svg viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><path d="M17 8l-5-5-5 5"/><path d="M12 3v12"/></svg>
                        </span>
                        <strong>Drop PDF, DOCX, or TXT files</strong>
                        <small>Resume text is encrypted in the database. Original files are not stored.</small>
                    </label>
                    <div class="file-list" id="uploaded-files"></div>
                    <div class="form-actions">
                        <button class="btn btn-primary" id="btn-analyze" type="button" disabled>Run analysis</button>
                    </div>
                </section>
            </section>

            <section class="view" id="view-results">
                <div class="view-header">
                    <div>
                        <p class="eyebrow">Ranking</p>
                        <h2 id="results-title">Results</h2>
                    </div>
                    <button class="btn btn-secondary" id="btn-export" type="button">Export CSV</button>
                </div>

                <div class="results-toolbar">
                    <label>Search
                        <input id="result-search" type="search" placeholder="Name, skill, status">
                    </label>
                    <label>Sort
                        <select id="sort-select">
                            <option value="score">Score</option>
                            <option value="experience">Experience</option>
                            <option value="uploaded">Newest</option>
                            <option value="name">Name</option>
                        </select>
                    </label>
                    <div class="filter-bar" id="filter-bar">
                        <button class="filter-chip active" data-filter="all" type="button">All</button>
                        <button class="filter-chip" data-filter="highly_qualified" type="button">Highly qualified</button>
                        <button class="filter-chip" data-filter="qualified" type="button">Qualified</button>
                        <button class="filter-chip" data-filter="partially_qualified" type="button">Partial</button>
                        <button class="filter-chip" data-filter="not_qualified" type="button">Not qualified</button>
                    </div>
                </div>

                <div class="result-summary" id="result-summary"></div>
                <div class="candidates-list" id="candidates-list"></div>
            </section>
        </main>
    </div>

    <div class="modal-overlay" id="modal-overlay" hidden>
        <section class="modal" role="dialog" aria-modal="true" aria-labelledby="modal-title">
            <header class="modal-header">
                <h3 id="modal-title">Candidate</h3>
                <button class="icon-btn" id="modal-close" type="button" title="Close">
                    <svg viewBox="0 0 24 24"><path d="M18 6L6 18"/><path d="M6 6l12 12"/></svg>
                </button>
            </header>
            <div class="modal-body" id="modal-body"></div>
        </section>
    </div>

    <div class="loading-overlay" id="loading-overlay" hidden>
        <div class="loader"></div>
        <p id="loading-text">Working...</p>
    </div>
    <div class="toast-container" id="toast-container" aria-live="polite"></div>
    <script src="/static/app.js"></script>
</body>
</html>
