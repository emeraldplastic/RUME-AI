<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RUME AI \u2014 Smart Resume Screening</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="bg-mesh"></div>
    <div class="bg-orb bg-orb-1"></div>
    <div class="bg-orb bg-orb-2"></div>
    <div class="bg-orb bg-orb-3"></div>

    <div class="auth-wrapper" id="auth-wrapper">
        <div class="auth-page active" id="login-page">
            <div class="auth-card">
                <div class="auth-brand">
                    <div class="brand-icon"><svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg></div>
                    <h1>RUME <span class="accent">AI</span></h1>
                    <p class="auth-tagline">AI-Powered Resume Screening</p>
                </div>
                <form class="auth-form" id="login-form" onsubmit="return false">
                    <div class="form-group"><label>Username</label><input type="text" id="login-username" required></div>
                    <div class="form-group"><label>Password</label><input type="password" id="login-password" required></div>
                    <button class="btn btn-primary btn-full" id="btn-login" type="submit">Sign In</button>
                </form>
                <p class="auth-switch">Don't have an account? <a href="#" id="go-register">Create one</a></p>
            </div>
        </div>
        <div class="auth-page" id="register-page">
            <div class="auth-card">
                <div class="auth-brand">
                    <div class="brand-icon"><svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="12" y1="11" x2="12" y2="17"/><line x1="9" y1="14" x2="15" y2="14"/></svg></div>
                    <h1>Join <span class="accent">RUME AI</span></h1>
                </div>
                <form class="auth-form" id="register-form" onsubmit="return false">
                    <div class="form-group"><label>Username</label><input type="text" id="reg-username" required></div>
                    <div class="form-group"><label>Email</label><input type="email" id="reg-email" required></div>
                    <div class="form-group"><label>Password</label><input type="password" id="reg-password" required></div>
                    <button class="btn btn-primary btn-full" id="btn-register" type="submit">Create Account</button>
                </form>
                <p class="auth-switch">Already have an account? <a href="#" id="go-login">Sign in</a></p>
            </div>
        </div>
    </div>

    <div class="app-shell" id="app-shell" style="display:none;">
        <aside class="sidebar">
            <div class="sidebar-brand">
                <div class="brand-icon-sm"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg></div>
                <span class="brand-text">RUME <span class="accent">AI</span></span>
            </div>
            <nav class="sidebar-nav">
                <a href="#" class="nav-item active" data-view="dashboard"><span>Dashboard</span></a>
                <a href="#" class="nav-item" data-view="jobs"><span>Jobs</span></a>
                <a href="#" class="nav-item" data-view="create-job"><span>New Job</span></a>
                <a href="#" class="nav-item" data-view="upload"><span>Upload</span></a>
            </nav>
            <div class="sidebar-footer">
                <div class="user-info"><div class="user-avatar" id="user-avatar">U</div><div class="user-details"><span class="user-name" id="user-name">User</span></div></div>
                <button class="btn-icon" id="btn-logout"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg></button>
            </div>
        </aside>

        <main class="main-area">
            <section class="view active" id="view-dashboard">
                <div class="view-header"><div><h2>Dashboard</h2><p class="view-subtitle" id="greeting">Welcome back</p></div></div>
                <div class="stats-grid">
                    <div class="stat-card stat-purple"><div class="stat-value" id="dash-total-jobs">0</div><div class="stat-label">Total Jobs</div></div>
                    <div class="stat-card stat-cyan"><div class="stat-value" id="dash-total-resumes">0</div><div class="stat-label">Resumes</div></div>
                    <div class="stat-card stat-green"><div class="stat-value" id="dash-qualified">0</div><div class="stat-label">Qualified</div></div>
                </div>
            </section>
            <!-- Other sections simplified for brevity in restoration -->
            <section class="view" id="view-jobs"><div class="view-header"><h2>Jobs</h2></div><div class="jobs-grid" id="jobs-grid"></div></section>
            <section class="view" id="view-create-job"><div class="view-header"><h2>New Job</h2></div><div class="form-card"><div class="form-group"><label>Title</label><input type="text" id="job-title"></div><div class="form-group"><label>Description</label><textarea id="job-description"></textarea></div><button class="btn btn-primary" id="btn-save-job">Save</button></div></section>
            <section class="view" id="view-upload"><div class="view-header"><h2>Upload</h2></div><div class="job-selector"><select id="upload-job-select"></select></div><div class="upload-zone" id="upload-zone">Drop files here</div></section>
            <section class="view" id="view-results"><div class="view-header"><h2>Results</h2></div><div class="candidates-list" id="candidates-list"></div></section>
        </main>
    </div>

    <div class="loading-overlay" id="loading-overlay"><div class="loading-content"><p id="loading-text">Processing...</p></div></div>
    <div class="toast-container" id="toast-container"></div>
    <script src="/static/app.js"></script>
</body>
</html>
